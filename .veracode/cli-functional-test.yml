name: Attendance-App
testcases:
- name: Attendance App Repo
  steps:
  - type: exec
    script: |
      cd ../
      source "$HOME/.sdkman/bin/sdkman-init.sh" && sdk use java 11.0.21-zulu
      veracode package --source . --type directory --output .veracode/output/auto --trust
    assertions:
      - result.code ShouldEqual 0
      - result.timeseconds ShouldBeLessThan 300
      - result.systemout ShouldContainSubstring ".veracode/output/auto/app-debug.apk"
      - result.systemout ShouldContainSubstring ".veracode/output/auto/veracode-auto-pack-Attendance-App-php-no-pm.zip"
      - result.systemout ShouldContainSubstring "Successfully created 2 artifact(s)."

  - type: check-zip-count
    zip-file: "app-debug.apk"
    assertions:
      - result.zip-file.count ShouldEqual 744

  - type: check-zip-contents
    zip-file: "app-debug.apk"
    assertions:
      - result.zip-file.difference ShouldBeEmpty
  
  - type: check-zip-count
    zip-file: "veracode-auto-pack-Attendance-App-php-no-pm.zip"
    assertions:
      - result.zip-file.count ShouldEqual 1

  - type: check-zip-contents
    zip-file: "veracode-auto-pack-Attendance-App-php-no-pm.zip"
    assertions:
      - result.zip-file.difference ShouldBeEmpty